<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P 大叔专属打砖块游戏 - 测试版</title>
    <script src="phaser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #game-container {
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 10px;
            overflow: hidden;
            max-width: 100%;
            max-height: 100vh;
        }
        .title {
            color: white;
            margin-bottom: 10px;
            text-align: center;
            font-size: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .instructions {
            color: white;
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
            max-width: 90%;
        }
        @media (max-width: 600px) {
            .title {
                font-size: 16px;
            }
            .instructions {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="title">🎮 P 大叔专属打砖块游戏 🎮</div>
    <div id="game-container"></div>
    <div class="instructions">
        📱 手机：触摸屏幕移动挡板 | 点击开始游戏<br>
        💻 电脑：← → 箭头键或 A/D 控制挡板 | 空格键开始游戏
    </div>
    <script src="game.js"></script>
</body>
</html>
